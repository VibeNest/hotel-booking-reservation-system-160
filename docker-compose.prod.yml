services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_public_upload:/var/www/html/public/upload
    networks:
      - hotel

  queue:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_public_upload:/var/www/html/public/upload
    networks:
      - hotel

  scheduler:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_public_upload:/var/www/html/public/upload
    networks:
      - hotel

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - app_public_upload:/var/www/html/public/upload:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - hotel

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - hotel

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotel

volumes:
  app_storage:
  app_bootstrap_cache:
  app_public_upload:
  mysql_data:
  certbot_www:
  letsencrypt:

networks:
  hotel:
    driver: bridge
